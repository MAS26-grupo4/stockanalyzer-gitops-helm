# Production environment overrides
# Used with: helm upgrade --install stockanalyzer ./charts/stockanalyzer \
#             -f charts/stockanalyzer/values.yaml \
#             -f environments/prod/values.yaml

replicaCount: 2

image:
  tag: v1.2.0
  pullPolicy: IfNotPresent

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
