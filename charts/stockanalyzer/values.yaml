# Default values for stockanalyzer.
# Override per-environment via environments/<env>/values.yaml

image:
  repository: ghcr.io/mas26-grupo4/stockanalyzer-gitops
  tag: v1.1.0
  pullPolicy: IfNotPresent

replicaCount: 2

namespace:
  create: true

container:
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60

service:
  type: ClusterIP
  port: 80
